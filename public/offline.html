<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AfriTable — Hors ligne</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #FDF8F0;
      color: #1A1A2E;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 360px;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #6B7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/images/logo-afritable.png" alt="AfriTable" />
    <h1>Pas de connexion</h1>
    <p>Vous semblez etre hors ligne. Verifiez votre connexion internet et reessayez.</p>
  </div>
</body>
</html>
